<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachin | Web Designer Portfolio</title>
    <style>
        /* बैकग्राउंड और तारों वाला एनीमेशन */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* चमकता हुआ कार्ड */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 350px;
            z-index: 1;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #00d2ff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { margin: 10px 0; font-size: 24px; color: #00d2ff; }
        p { font-size: 16px; color: #ccc; margin-bottom: 20px; }

        /* बटन स्टाइल */
        .btn {
            display: block;
            padding: 12px;
            margin: 10px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .insta-btn {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
        }

        .order-btn {
            background: #00d2ff;
            color: #090a0f;
        }

        .skill-tag {
            display: inline-block;
            background: rgba(0, 210, 255, 0.2);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin: 5px;
            border: 1px solid #00d2ff;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="1.jpg" alt="Sachin" class="profile-img">
        
        <h1>Sachin</h1>
        <p>Web Designer & Commerce Student</p>

        <div style="margin-bottom: 20px;">
            <span class="skill-tag">Web Coding</span>
            <span class="skill-tag">Accountancy</span>
            <span class="skill-tag">Digital Creator</span>
        </div>

        <a href="https://www.instagram.com/sk_shayar__123" class="btn insta-btn">Instagram प्रोफाइल देखें</a>
        <a href="https://www.instagram.com/sk_shayar__123" class="btn order-btn">वेबसाइट बनवाने के लिए मैसेज करें</a>
    </div>

</body>
</html>
